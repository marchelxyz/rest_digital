# Railway: автодеплой при push в main
# 1. Добавьте проект в Railway и подключите репозиторий
# 2. Добавьте DATABASE_URL в переменные Railway (PostgreSQL плагин)
# 3. Railway сам деплоит при push — этот workflow можно использовать для тестов/линта перед деплоем

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm run db:generate
      - run: npm run build
      - run: npm run lint
        continue-on-error: true
